<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="200" fill="#0a192f" />
  
  <!-- Abstract Data Grid -->
  <g stroke="#1d2d44" stroke-width="1">
    <line x1="0" y1="40" x2="800" y2="40" />
    <line x1="0" y1="80" x2="800" y2="80" />
    <line x1="0" y1="120" x2="800" y2="120" />
    <line x1="0" y1="160" x2="800" y2="160" />
    <line x1="100" y1="0" x2="100" y2="200" />
    <line x1="200" y1="0" x2="200" y2="200" />
    <line x1="300" y1="0" x2="300" y2="200" />
    <line x1="400" y1="0" x2="400" y2="200" />
    <line x1="500" y1="0" x2="500" y2="200" />
    <line x1="600" y1="0" x2="600" y2="200" />
    <line x1="700" y1="0" x2="700" y2="200" />
  </g>

  <!-- Abstract Network Nodes (Agents) -->
  <circle cx="150" cy="100" r="8" fill="#64ffda" opacity="0.8" />
  <circle cx="400" cy="60" r="10" fill="#64ffda" opacity="0.8" />
  <circle cx="650" cy="120" r="8" fill="#64ffda" opacity="0.8" />
  <circle cx="400" cy="140" r="6" fill="#64ffda" opacity="0.8" />
  
  <path d="M150 100 L400 60 L650 120 L400 140 Z" fill="none" stroke="#64ffda" stroke-width="2" stroke-dasharray="5,5" />

  <!-- Main Title -->
  <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ccd6f6">
    MULTI-AGENT HEDGE FUND
  </text>
  
  <!-- Subtitle -->
  <text x="50%" y="65%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#8892b0" letter-spacing="2">
    AUTONOMOUS ALPHA ENGINE
  </text>

  <!-- Accent Line -->
  <line x1="300" y1="150" x2="500" y2="150" stroke="#64ffda" stroke-width="3" />
</svg>
