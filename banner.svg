<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0a192f" />
  
  <!-- Subtle Grid -->
  <g stroke="#1d2d44" stroke-width="1" opacity="0.5">
    <path d="M0 50 L800 50 M0 100 L800 100 M0 150 L800 150 M0 200 L800 200 M0 250 L800 250 M0 300 L800 300 M0 350 L800 350" />
    <path d="M50 0 L50 400 M100 0 L100 400 M150 0 L150 400 M200 0 L200 400 M250 0 L250 400 M300 0 L300 400 M350 0 L350 400 M400 0 L400 400 M450 0 L450 400 M500 0 L500 400 M550 0 L550 400 M600 0 L600 400 M650 0 L650 400 M700 0 L700 400 M750 0 L750 400" />
  </g>

  <!-- Connection Lines (Square + Center) -->
  <g stroke="#64ffda" stroke-width="2" opacity="0.4" stroke-dasharray="8,4">
    <rect x="200" y="80" width="400" height="240" fill="none" />
    <line x1="200" y1="80" x2="600" y2="320" />
    <line x1="600" y1="80" x2="200" y2="320" />
  </g>

  <!-- Center Bull (Stylized) -->
  <g transform="translate(365, 165) scale(0.7)">
    <!-- Horns -->
    <path d="M10 30 Q 0 0, 40 10 M90 30 Q 100 0, 60 10" stroke="#ccd6f6" stroke-width="6" fill="none" />
    <!-- Head/Shoulders -->
    <path d="M20 40 L80 40 L90 80 L50 110 L10 80 Z" fill="#ccd6f6" />
    <circle cx="35" cy="65" r="4" fill="#0a192f" />
    <circle cx="65" cy="65" r="4" fill="#0a192f" />
    <!-- Market Up Arrow Overlay -->
    <path d="M50 40 L50 10 M40 20 L50 10 L60 20" stroke="#64ffda" stroke-width="4" fill="none" />
  </g>
  <text x="400" y="275" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#64ffda">MARKET</text>

  <!-- Agent 1: The Analyst (Top Left) -->
  <circle cx="200" cy="80" r="12" fill="#64ffda" />
  <text x="200" y="60" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ccd6f6">ANALYST</text>

  <!-- Agent 2: The Quant (Top Right) -->
  <circle cx="600" cy="80" r="12" fill="#64ffda" />
  <text x="600" y="60" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ccd6f6">QUANT</text>

  <!-- Agent 3: The Risk Manager (Bottom Left) -->
  <circle cx="200" cy="320" r="12" fill="#64ffda" />
  <text x="200" y="345" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ccd6f6">RISK MANAGER</text>

  <!-- Agent 4: The Librarian (Bottom Right) -->
  <circle cx="600" cy="320" r="12" fill="#64ffda" />
  <text x="600" y="345" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ccd6f6">LIBRARIAN</text>

  <!-- Project Title Overlay -->
  <rect x="250" y="10" width="300" height="30" rx="15" fill="#112240" />
  <text x="400" y="27" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ccd6f6" letter-spacing="3">GLOBAL ALPHA ENGINE</text>
</svg>
